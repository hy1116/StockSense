apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: stocksense
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: backend
        image: stocksense-backend:latest
        lifecycle:
          preStop:
            exec:
              command: ["sh", "-c", "sleep 10"]
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: TZ
          value: "Asia/Seoul"
        - name: DATABASE_URL
          valueFrom:
            configMapKeyRef:
              name: stocksense-config
              key: DATABASE_URL
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: stocksense-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: stocksense-config
              key: REDIS_PORT
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: stocksense-secret
              key: POSTGRES_PASSWORD
        - name: REDIS_PASSWORD
          value: ""
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: stocksense-secret
              key: JWT_SECRET
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: stocksense-secret
              key: ENCRYPTION_KEY
        - name: KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: stocksense-config
              key: KAFKA_BOOTSTRAP_SERVERS
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: stocksense-secret
              key: GEMINI_API_KEY
              optional: true
        volumeMounts:
        # models-storage: DB 로드 실패 시 fallback 전용 (emptyDir → 재시작 시 DB에서 재로드)
        - name: models-storage
          mountPath: /app/models
        # data-storage 제거: /app/data는 ML 파이프라인(Argo)만 사용하며
        # Argo는 ml-data-pvc를 별도로 마운트함. 백엔드 API는 이 경로를 사용하지 않음.
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 90   # ML 모델 로딩 시간 고려
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60   # DB 연결 + Kafka 초기화 + 모델 로딩 고려
          periodSeconds: 5
          failureThreshold: 6       # 최대 90초(60+6×5)까지 허용
      volumes:
      # emptyDir: ReadWriteOnce PVC 제거 → 복수 레플리카 문제 해소
      # 파드 재시작 시 /app/models는 비워지지만 prediction.py가 DB에서 재로드함
      - name: models-storage
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: stocksense
spec:
  selector:
    app: backend
  ports:
  - port: 80
    targetPort: 8000
  type: ClusterIP
