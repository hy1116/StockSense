# ──────────────────────────────────────────────────────────────────
# Kafka (KRaft 모드, 단일 브로커)
#
# 구성 요소:
#   1. Headless Service  - kafka-0 Pod 고정 DNS (KRaft 컨트롤러 통신용)
#   2. ClusterIP Service - 앱(backend)에서 kafka-service:9092로 접근
#   3. StatefulSet       - Pod 이름/볼륨 고정 (kafka-0)
#   4. PVC               - 메시지 영구 저장
# ──────────────────────────────────────────────────────────────────

# 1. Headless Service: kafka-0.kafka-headless.stocksense.svc.cluster.local
#    KRaft 컨트롤러 쿼럼(CONTROLLER_QUORUM_VOTERS)에서 브로커 식별용
apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: stocksense
  labels:
    app: kafka
spec:
  clusterIP: None          # Headless = DNS로 Pod IP 직접 반환
  selector:
    app: kafka
  ports:
  - name: broker
    port: 9092
    targetPort: 9092
  - name: controller
    port: 9093
    targetPort: 9093

---

# 2. ClusterIP Service: backend → kafka-service:9092 로 접근
apiVersion: v1
kind: Service
metadata:
  name: kafka-service
  namespace: stocksense
  labels:
    app: kafka
spec:
  selector:
    app: kafka
  ports:
  - name: broker
    port: 9092
    targetPort: 9092
  type: ClusterIP

---

# 3. StatefulSet: Pod 이름 kafka-0 고정, PVC 1:1 바인딩
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: stocksense
spec:
  serviceName: kafka-headless   # Headless Service와 연결
  replicas: 1                   # 단일 브로커 (개발/소규모)
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
      - name: kafka
        # bitnami → apache/kafka 공식 이미지로 변경 (bitnami Docker Hub 배포 중단)
        image: apache/kafka:3.8.0
        ports:
        - containerPort: 9092
          name: broker
        - containerPort: 9093
          name: controller
        env:
        # KRaft 기본 설정 (apache/kafka는 KAFKA_CFG_ 없이 KAFKA_ prefix 사용)
        - name: KAFKA_NODE_ID
          value: "0"
        - name: KAFKA_PROCESS_ROLES
          value: "broker,controller"

        # 리스너 설정
        # PLAINTEXT: 앱 접근용 / CONTROLLER: 브로커 간 KRaft 통신용
        - name: KAFKA_LISTENERS
          value: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
        - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
          value: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
        - name: KAFKA_CONTROLLER_LISTENER_NAMES
          value: "CONTROLLER"

        # k8s 내부에서 접근하는 주소: ClusterIP Service 이름 사용
        - name: KAFKA_ADVERTISED_LISTENERS
          value: "PLAINTEXT://kafka-service:9092"

        # KRaft 쿼럼: kafka-0 Pod의 Headless DNS로 컨트롤러 지정
        - name: KAFKA_CONTROLLER_QUORUM_VOTERS
          value: "0@kafka-0.kafka-headless.stocksense.svc.cluster.local:9093"

        # 단일 브로커 설정 (replication factor = 1)
        - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          value: "1"
        - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
          value: "1"
        - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
          value: "1"

        # 운영 설정
        - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
          value: "true"
        - name: KAFKA_LOG_RETENTION_HOURS
          value: "24"
        - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
          value: "0"
        # PVC 마운트 경로와 일치시켜 데이터 영속성 확보
        - name: KAFKA_LOG_DIRS
          value: "/var/lib/kafka/data"

        volumeMounts:
        - name: kafka-storage
          mountPath: /var/lib/kafka/data  # apache/kafka 데이터 경로

        # 준비 확인: 9092 포트가 열리면 Ready
        # (kafka-topics.sh는 Java AdminClient 타임아웃이 길어 probe에 부적합)
        readinessProbe:
          tcpSocket:
            port: 9092
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 5

        livenessProbe:
          tcpSocket:
            port: 9092
          initialDelaySeconds: 60
          periodSeconds: 20
          failureThreshold: 3

        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"

  # StatefulSet의 PVC 템플릿: Pod마다 자동으로 PVC 생성
  volumeClaimTemplates:
  - metadata:
      name: kafka-storage
    spec:
      accessModes:
      - ReadWriteOnce
      storageClassName: local-path
      resources:
        requests:
          storage: 5Gi
